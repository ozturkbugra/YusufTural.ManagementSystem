<body>
  <div class="fauth">
    <main class="fauth-main">
      <div class="fauth-main-inner">
        <a href="index.html" class="fauth-logo fauth-logo-center">
          <img src="assets/img/logo.webp" alt="NiceAdmin">
          <span>NiceAdmin</span>
        </a>

        <div class="fauth-card fauth-card-sm">
          <div class="fauth-card-head text-center">
            <span class="fauth-icon"><i class="bi bi-shield-lock"></i></span>
            <h1 class="fauth-title">Set new password</h1>
            <p class="fauth-subtitle">Choose a strong password you have not used before.</p>
          </div>

          <form class="fauth-form" novalidate>
            <div class="fauth-field">
              <label for="password" class="form-label">New password</label>
              <div class="input-group">
                <input type="password" class="form-control" id="password" name="password" placeholder="New password" required>
                <button class="btn btn-outline-secondary" type="button" data-toggle-password><i class="bi bi-eye"></i></button>
              </div>
            </div>

            <div class="fauth-field">
              <label for="confirmPassword" class="form-label">Confirm password</label>
              <div class="input-group">
                <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="Confirm password" required>
                <button class="btn btn-outline-secondary" type="button" data-toggle-password><i class="bi bi-eye"></i></button>
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">Reset Password</button>
          </form>

          <p class="fauth-foot-text"><a href="auth-login.html" class="fauth-link"><i class="bi bi-arrow-left"></i> Back to login</a></p>
        </div>

        <footer class="footer-centered">
          <div class="footer-copyright">&copy; 2026 <a href="#">NiceAdmin</a>. All Rights Reserved.</div>
          <div class="footer-links"><a href="#">Privacy</a><a href="#">Terms</a><a href="#">Help</a></div>
        </footer>
      </div>
    </main>
  </div>
